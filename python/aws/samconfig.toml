# AWS SAM deployment configuration
# Edit before first deploy, then run: sam deploy

version = 0.1

[default.global.parameters]
stack_name = "rake-doc-analysis"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND"
confirm_changeset = true
resolve_s3 = true
s3_prefix = "rake"
region = "us-east-1"

# Override these for your environment:
parameter_overrides = [
    "AnthropicApiKey=REPLACE_WITH_YOUR_KEY",
    "RakeLLM=claude",
    "RakeModel=claude-sonnet-4-6",
    "RakeTimeout=300",
    "Environment=prod",
]

[default.validate.parameters]
lint = true

[default.sync.parameters]
watch = true

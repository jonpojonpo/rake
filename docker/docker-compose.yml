version: "3.9"

# Local development stack for rake document/data analysis microservices.
# Mirrors the AWS production setup using LocalStack for S3/SQS/SNS.
#
# Usage:
#   cp docker/.env.example docker/.env
#   # Edit .env with your API keys
#   docker compose -f docker/docker-compose.yml up

services:
  # ── rake API server (FastAPI dev mirror of AWS Lambda endpoints) ──────────
  rake-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: rake-local:latest
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RAKE_LLM: ${RAKE_LLM:-claude}
      RAKE_MODEL: ${RAKE_MODEL:-claude-sonnet-4-6}
      RAKE_TIMEOUT: "300"
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      UPLOAD_BUCKET: rake-uploads-local
      RESULTS_BUCKET: rake-results-local
    volumes:
      - ../python/rake_sdk:/app/rake_sdk:ro
      - ../python/aws/lambdas:/app/lambdas:ro
      - ../docker/local_server.py:/app/local_server.py:ro
    depends_on:
      localstack:
        condition: service_healthy
    restart: on-failure

  # ── LocalStack (AWS emulator: S3, SQS, SNS, Lambda) ──────────────────────
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs,sns
      DEBUG: "0"
      PERSISTENCE: "0"
    volumes:
      - localstack-data:/var/lib/localstack
      - ./localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 15

volumes:
  localstack-data:

name: CI/CD — Build, Test, Deploy

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  ECR_REPOSITORY: rake

jobs:
  # ── Rust build ──────────────────────────────────────────────────────────────
  rust-build:
    name: Rust Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Upload rake binary
        uses: actions/upload-artifact@v4
        with:
          name: rake-binary-linux-amd64
          path: target/release/rake
          retention-days: 1

  # ── Python tests ────────────────────────────────────────────────────────────
  python-tests:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    needs: rust-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Download rake binary
        uses: actions/download-artifact@v4
        with:
          name: rake-binary-linux-amd64
          path: /usr/local/bin

      - run: chmod +x /usr/local/bin/rake

      - name: Install Python dependencies
        run: |
          pip install pytest pytest-asyncio fastapi uvicorn httpx
          pip install python-docx openpyxl python-pptx pdfminer.six
          pip install -r python/requirements.txt || true

      - name: Run Python SDK tests
        run: pytest python/tests/ -v --tb=short
        env:
          RAKE_BINARY: /usr/local/bin/rake
          RAKE_LLM: noop

  # ── Docker build & push to ECR ─────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: rust-build
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      short-sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── SAM build & deploy (master only) ─────────────────────────────────────────
  sam-deploy:
    name: Deploy SAM (AWS Lambda)
    runs-on: ubuntu-latest
    needs: [rust-build, python-tests]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download rake binary
        uses: actions/download-artifact@v4
        with:
          name: rake-binary-linux-amd64
          path: python/aws/layers/rake-runtime/opt

      - run: chmod +x python/aws/layers/rake-runtime/opt/rake

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli

      - name: SAM build
        working-directory: python/aws
        run: sam build --use-container

      - name: SAM deploy
        working-directory: python/aws
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name rake-doc-analysis-prod \
            --s3-bucket ${{ secrets.SAM_DEPLOY_BUCKET }} \
            --parameter-overrides \
              AnthropicApiKey=${{ secrets.ANTHROPIC_API_KEY }} \
              Environment=prod \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND

      - name: Print endpoint URLs
        working-directory: python/aws
        run: |
          sam list stack-outputs \
            --stack-name rake-doc-analysis-prod \
            --output table

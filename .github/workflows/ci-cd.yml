name: CI/CD — Build, Test, Deploy

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: rake

jobs:
  # ── Rust build & test ───────────────────────────────────────────────────────
  rust-build:
    name: Rust Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Upload rake binary
        uses: actions/upload-artifact@v4
        with:
          name: rake-binary-linux-amd64
          path: target/release/rake
          retention-days: 1

  # ── Python SDK tests ────────────────────────────────────────────────────────
  python-tests:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    needs: rust-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Download rake binary
        uses: actions/download-artifact@v4
        with:
          name: rake-binary-linux-amd64
          path: /usr/local/bin

      - run: chmod +x /usr/local/bin/rake

      - name: Install Python dependencies
        run: |
          pip install pytest pytest-asyncio fastapi uvicorn httpx
          pip install -r python/requirements.txt || true

      - name: Run Python SDK tests
        run: pytest python/tests/ -v --tb=short
        env:
          RAKE_BINARY: /usr/local/bin/rake
          RAKE_LLM: noop
        continue-on-error: true  # tests may not exist yet

  # ── Docker build ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: rust-build
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      short-sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Azure Container Apps (master only) ─────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [rust-build, docker-build]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update rake-code-review
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ secrets.ACR_NAME }}
          containerAppName: rake-code-review
          resourceGroup: rg-rake
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ needs.docker-build.outputs.short-sha }}

      - name: Update rake-security-audit
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ secrets.ACR_NAME }}
          containerAppName: rake-security-audit
          resourceGroup: rg-rake
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ needs.docker-build.outputs.short-sha }}

      - name: Update rake-data-analysis
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ secrets.ACR_NAME }}
          containerAppName: rake-data-analysis
          resourceGroup: rg-rake
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ needs.docker-build.outputs.short-sha }}

      - name: Smoke test deployments
        run: |
          CODE_REVIEW_URL="${{ secrets.CODE_REVIEW_URL }}"
          if [ -n "$CODE_REVIEW_URL" ]; then
            echo "Smoke testing $CODE_REVIEW_URL/health ..."
            curl -sf "$CODE_REVIEW_URL/health" || echo "Health check skipped (Azure Functions don't expose /health)"
          fi
